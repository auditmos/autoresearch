services:
  autoresearch:
    build: .
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - autoresearch-cache:/root/.cache/autoresearch
      - ./results:/app/results
    # Usage:
    #   docker compose up                          # prepare (if needed) + train
    #   docker compose run autoresearch prepare.py  # data download only
    #   docker compose run autoresearch train.py    # train only

volumes:
  autoresearch-cache:
