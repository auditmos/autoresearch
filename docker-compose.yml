services:
  autoresearch:
    build: .
    user: researcher
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - autoresearch-cache:/home/researcher/.cache/autoresearch
      - claude-config:/home/researcher/.claude
      - ./results:/app/results
    # Usage:
    #   docker compose up                              # prepare + train (single run)
    #   docker compose run autoresearch login           # authenticate claude (one-time)
    #   docker compose run autoresearch agent           # autonomous agent mode
    #   docker compose run autoresearch train.py        # train only

volumes:
  autoresearch-cache:
  claude-config:
