services:
  autoquant:
    build: .
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - GIT_REMOTE_URL=${GIT_REMOTE_URL:-}
    volumes:
      - ./data:/home/researcher/.cache/autoquant/data
      - claude-config:/home/researcher/.claude
    stdin_open: true
    tty: true
    # Usage:
    #   docker compose run autoquant login           # authenticate claude (one-time)
    #   docker compose run autoquant agent           # autonomous agent mode (tmux)
    #   docker compose run autoquant strategy.py     # single backtest run

volumes:
  claude-config:
