services:
  autoquant:
    build: .
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - EXPERIMENT=${EXPERIMENT:-cpu-ta}
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - GIT_REMOTE_URL=${GIT_REMOTE_URL:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-}
    volumes:
      - ../../experiments/${EXPERIMENT:-cpu-ta}:/experiment:ro
      - ../../data:/home/researcher/.cache/autoquant/data
      - autoquant-${EXPERIMENT:-cpu-ta}-claude:/home/researcher/.claude
    stdin_open: true
    tty: true
    # Usage (from containers/autoquant/, set EXPERIMENT in .env or prefix command):
    #   docker compose run autoquant login             # authenticate claude (one-time)
    #   docker compose run autoquant agent             # autonomous agent mode
    #   EXPERIMENT=gpu-ta docker compose run autoquant agent

volumes:
  autoquant-cpu-ta-claude:
  autoquant-gpu-ta-claude:
